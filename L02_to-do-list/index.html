<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="styles.css">
  <title>Styled To-Do List</title>
</head>

<body>
  <main>
    <section>
      <header>
        <h1>My To-Do List</h1>
      </header>
      <ul class="todo-list">
        <li>
          <input type="checkbox" name="check-item" id="task1">
          <label for="task1">CPU: AMD Ryzen 7 7800X3D</label>
          <ul class="sub-item">
            <li class="sub-item-link">
              <a href="https://www.pccomponentes.com/amd-ryzen-7-7800x3d-44ghz" class="sub-item-link" target="_blank">PC Componentes</a>
            </li>
          </ul>
        </li>
        <li>
          <input type="checkbox" name="check-item" id="task2">
          <label for="task2">Motherboard: ASUS ROG Strix B650E-F Gaming WiFi</label>
          <ul class="sub-item">
            <li class="sub-item-link">
              <a href="https://www.amazon.es/ASUS-ROG-Strix-B650E-F-Gaming" class="sub-item-link" target="_blank">Amazon Spain</a>
            </li>
          </ul>
        </li>
        <li>
          <input type="checkbox" name="check-item" id="task3">
          <label for="task3">RAM: Corsair Vengeance RGB 32GB (2x16GB) DDR5 6000MHz</label>
          <ul class="sub-item">
            <li class="sub-item-link">
              <a href="https://www.coolmod.com/corsair-vengeance-rgb-32gb-2x16gb-ddr5-6000mhz" class="sub-item-link"
                target="_blank">Coolmod</a>
            </li>
          </ul>
        </li>
        <li>
          <input type="checkbox" name="check-item" id="task4">
          <label for="task4">GPU: NVIDIA RTX 4070 Ti SUPER</label>
          <ul class="sub-item">
            <li class="sub-item-link">
              <a href="https://www.newegg.com/global/es-en/" class="sub-item-link" target="_blank">Newegg Spain</a>
            </li>
          </ul>
        </li>
        <li>
          <input type="checkbox" name="check-item" id="task5">
          <label for="task5">SSD: Samsung 990 PRO 1TB NVMe</label>
          <ul class="sub-item">
            <li class="sub-item-link">
              <a href="https://www.elcorteingles.es/tecnologia/" class="sub-item-link" target="_blank">El Corte Inglés</a>
            </li>
          </ul>
        </li>
        <li>
          <input type="checkbox" name="check-item" id="task6">
          <label for="task6">PSU: Corsair RM850x (850W, 80+ Gold)</label>
          <ul class="sub-item">
            <li class="sub-item-link">
              <a href="https://www.ldlc.com/" class="sub-item-link" target="_blank">LDLC</a>
            </li>
          </ul>
        </li>
      </ul>
    </section>
  </main>
</body>

</html>
