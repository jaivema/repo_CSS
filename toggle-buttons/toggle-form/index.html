<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="style.css" />
		<link rel="stylesheet" href="conmutado_form.css" />
		<title>Toggle in Form</title>
	</head>
	<body>
		<div class="layout">
			<h1>Conmutado dentro de un formulario</h1>
			<form class="layout__toggle">
				<span class="toggle__label">Conmutado form</span>
				<label class="toggle__switch" for="checkbox">
					<input type="checkbox" class="switch__checkbox" id="checkbox" />
					<div class="checkbox__slider"></div>
				</label>
			</form>
		</div>
	</body>
</html>
