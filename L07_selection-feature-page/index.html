<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="styles.css">
    <title>Selection Feature Page</title>
</head>

<body>
  <h1>Feature Selection</h1>
  <div class="feature-card-container">
    <label for="cloud-storage" class="feature-card">
      <input type="checkbox" name="cloud-storage" id="cloud-storage">
      <h2>Cloud Storage</h2>
      <p>100 Gigabyte secure storage</p>
    </label>
    <label for="dedicated-support" class="feature-card">
      <input type="checkbox" name="dedicated-support" id="dedicated-support">
      <h2>Dedicated Support</h2>
      <p>24/7 customer help</p>
    </label>
    <label for="advanced-analytics" class="feature-card">
      <input type="checkbox" name="advanced-analytics" id="advanced-analytics">
      <h2>Advanced Analytics</h2>
      <p>Insights & reports</p>
    </label>
    <label for="api-access" class="feature-card">
      <input type="checkbox" name="api-access" id="api-access">
      <h2>API Access</h2>
      <p>Integrate with your custom built tools</p>
    </label>
    <label for="custom-themes" class="feature-card">
      <input type="checkbox" name="custom-themes" id="custom-themes">
      <h2>Custom User Themes</h2>
      <p>Personalized dashboard design</p>
    </label>
  </div>
</body>

</html>
